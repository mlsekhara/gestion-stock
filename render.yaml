databases:
  - name: gestion-stock-db
    plan: free
    databaseName: gestion_stock
    user: stock

services:
  - type: web
    name: gestion-stock
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestion-stock-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: SEED_DEMO
        value: "true"
