<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ring" x1="0%" y1="10%" x2="100%" y2="90%">
      <stop offset="0%" stop-color="#36e3e6"/>
      <stop offset="50%" stop-color="#9b6bff"/>
      <stop offset="100%" stop-color="#ef47bf"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card"><rect width="512" height="512" rx="112"/></clipPath>
  </defs>
  <g clip-path="url(#card)">
    <rect width="512" height="512" fill="#0e1018"/>
    <!-- anneau dual-tone -->
    <circle cx="256" cy="256" r="232" fill="url(#ring)" filter="url(#glow)"/>
    <!-- disque void -->
    <circle cx="256" cy="256" r="200" fill="#11131c"/>
    <!-- monogramme AD -->
    <g font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="172" text-anchor="middle">
      <text x="190" y="312" fill="#36e3e6">A</text>
      <text x="324" y="312" fill="#ef47bf">D</text>
    </g>
  </g>
</svg>
