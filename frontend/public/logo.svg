<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#1a1426"/>
      <stop offset="60%" stop-color="#0d0a16"/>
      <stop offset="100%" stop-color="#040308"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#ff2bd6"/>
      <stop offset="45%" stop-color="#d63cff"/>
      <stop offset="100%" stop-color="#1ef0f0"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7ffafa"/>
      <stop offset="100%" stop-color="#23cfdb"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringcore" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="textglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="card"><rect x="0" y="0" width="512" height="512" rx="96"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- subtle glitch scanlines -->
    <g opacity="0.14" fill="#ffffff">
      <rect x="0" y="96"  width="512" height="2"/>
      <rect x="0" y="168" width="512" height="1"/>
      <rect x="0" y="262" width="512" height="2"/>
      <rect x="0" y="354" width="512" height="1"/>
      <rect x="0" y="430" width="512" height="2"/>
    </g>
    <rect x="34"  y="150" width="120" height="4" fill="#ff2bd6" opacity="0.5"/>
    <rect x="360" y="338" width="150" height="4" fill="#1ef0f0" opacity="0.5"/>

    <!-- neon ring: colored glow then bright white core -->
    <circle cx="256" cy="248" r="168" fill="none" stroke="url(#ring)" stroke-width="40" filter="url(#glow)" opacity="0.95"/>
    <circle cx="256" cy="248" r="168" fill="none" stroke="#ffffff" stroke-width="13" filter="url(#ringcore)"/>
    <circle cx="256" cy="248" r="168" fill="none" stroke="#ffffff" stroke-width="6"/>

    <!-- AD : glow layer + crisp layer -->
    <g font-family="Arial, 'Segoe UI', sans-serif" font-weight="700" letter-spacing="12">
      <text x="256" y="258" text-anchor="middle" font-size="146" fill="#1ef0f0" opacity="0.55" filter="url(#textglow)">AD</text>
      <text x="256" y="258" text-anchor="middle" font-size="146" fill="url(#txt)">AD</text>
    </g>
    <!-- Phone (capital P) : glow layer + crisp layer -->
    <g font-family="Arial, 'Segoe UI', sans-serif" font-weight="700" font-style="italic" letter-spacing="1">
      <text x="256" y="366" text-anchor="middle" font-size="78" fill="#1ef0f0" opacity="0.5" filter="url(#textglow)">Phone</text>
      <text x="256" y="366" text-anchor="middle" font-size="78" fill="url(#txt)">Phone</text>
    </g>
  </g>
</svg>
